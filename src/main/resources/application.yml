server:
  port: 8080

spring:
  application:
    name: ecommerce-api

  # ── MySQL ──────────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:ecommerce}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:ecommerce_user}
    password: ${MYSQL_PASSWORD:ecommerce_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 60000      # wait up to 60s for a connection (useful on docker startup)
      initialization-fail-timeout: -1 # don't fail startup if DB not immediately available
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update               # auto-create / update tables from entity classes
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # ── Elasticsearch ──────────────────────────────────────────────────────────
  elasticsearch:
    uris: http://${ES_HOST:localhost}:${ES_PORT:9200}
    connection-timeout: 10s
    socket-timeout: 30s

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── App-specific ──────────────────────────────────────────────────────────────
app:
  dummyjson-url: https://dummyjson.com/products?limit=0
