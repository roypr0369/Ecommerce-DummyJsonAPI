version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# E-Commerce API — Docker Compose
#
# Start everything with a single command:
#   docker compose up --build
#
# Service startup order (enforced via healthchecks):
#   1. mysql        — waits until mysqladmin ping succeeds
#   2. elasticsearch — waits until cluster health is green/yellow
#   3. api          — waits until both above are healthy, then boots Spring
#                     (DataSeeder runs automatically on first start)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL 8.0 ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ecommerce_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: ecommerce_user
      MYSQL_PASSWORD: ecommerce_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Elasticsearch 8.11 ────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ecommerce_es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL",
         "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s

  # ── Spring Boot API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ecommerce
      MYSQL_USER: ecommerce_user
      MYSQL_PASSWORD: ecommerce_pass
      ES_HOST: elasticsearch
      ES_PORT: 9200
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

volumes:
  mysql_data:
  es_data:
