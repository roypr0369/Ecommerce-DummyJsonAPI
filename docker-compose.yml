version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# E-Commerce API — CDC Architecture with Debezium
#
# Startup order:
#   1. mysql           — binlog enabled, health checked
#   2. zookeeper       — required by Kafka
#   3. kafka           — message broker, health checked
#   4. elasticsearch   — search store, health checked
#   5. kafka-connect   — Debezium MySQL connector, health checked
#   6. connector-init  — one-shot: registers the Debezium connector via REST
#   7. api             — Spring Boot: seeds MySQL, creates ES index, consumes Kafka
#
# Data flow after startup:
#   Spring Boot → MySQL (seed only)
#   MySQL binlog → Debezium (kafka-connect) → Kafka topic
#   Spring Boot Kafka consumer → reads topic → indexes to Elasticsearch
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL 8.0 (binlog enabled for CDC) ────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ecommerce_mysql
    restart: unless-stopped
    command:
      - --log-bin=mysql-bin
      - --binlog-format=ROW        # ROW format gives Debezium full before/after values
      - --binlog-row-image=FULL    # Capture all columns, not just changed ones
      - --server-id=1              # Unique server-id required by replication protocol
      - --expire-logs-days=1       # Keep binlog for 1 day in dev
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: ecommerce_user
      MYSQL_PASSWORD: ecommerce_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Zookeeper (required by Kafka) ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce_zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce_kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Elasticsearch 8.11 ────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ecommerce_es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.routing.allocation.disk.threshold_enabled=false
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL",
         "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s

  # ── Debezium / Kafka Connect ──────────────────────────────────────────────
  # Official Debezium image — MySQL connector pre-installed.
  # Reads MySQL binlog, publishes row changes to Kafka topics.
  kafka-connect:
    image: debezium/connect:2.4
    container_name: ecommerce_debezium
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: debezium-connect-group
      CONFIG_STORAGE_TOPIC: debezium_configs
      OFFSET_STORAGE_TOPIC: debezium_offsets
      STATUS_STORAGE_TOPIC: debezium_statuses
      # Disable schema envelope — payloads are plain JSON, simpler to parse
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8083/connectors"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 45s

  # ── Connector Init (one-shot container) ───────────────────────────────────
  # Registers the MySQL Debezium connector as soon as kafka-connect is healthy.
  # Container exits after the POST — it is not a long-running service.
  connector-init:
    image: curlimages/curl:latest
    container_name: ecommerce_connector_init
    depends_on:
      kafka-connect:
        condition: service_healthy
    volumes:
      - ./debezium/register-connector.json:/register-connector.json
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        echo 'Registering Debezium MySQL connector...' &&
        curl -f -X POST http://kafka-connect:8083/connectors \
          -H 'Content-Type: application/json' \
          -d @/register-connector.json &&
        echo 'Connector registered.'
    restart: on-failure

  # ── Spring Boot API ───────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ecommerce
      MYSQL_USER: ecommerce_user
      MYSQL_PASSWORD: ecommerce_pass
      ES_HOST: elasticsearch
      ES_PORT: 9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  mysql_data:
  es_data: